services:
  - type: web
    name: execflow-api
    env: node
    buildCommand: pnpm install --prod=false
    startCommand: cd apps/api && pnpm run start
    envVars:
      - key: DATABASE_URL
        sync: false
  - type: worker
    name: execflow-workers
    env: node
    buildCommand: pnpm install --prod=false && pnpm -F @execflow/workers exec playwright install chromium
    startCommand: cd packages/workers && pnpm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: COURT_CPF
        sync: false
      - key: COURT_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: JUDIT_API_KEY
        sync: false
